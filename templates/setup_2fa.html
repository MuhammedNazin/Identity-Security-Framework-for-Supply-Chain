{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;" class="ghost-transition">
    <div class="card" style="border: 2px solid var(--border-machined); background: #050608;">
        <h2 style="text-align: center;">MFA_INITIALIZATION</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2.5rem;" class="mono">LINK_PHYSICAL_DEVICE_TO_LEDGER</p>
        
        <div style="text-align: center; margin-bottom: 3rem; background: #000; padding: 3rem; border: 1px solid var(--border-machined); position: relative;">
            <div style="position: absolute; inset: 0; box-shadow: inset 0 0 100px rgba(0,0,0,0.9); pointer-events: none;"></div>
            <div style="background: white; padding: 1.5rem; display: inline-block; border-radius: 0.25rem; box-shadow: 0 0 30px rgba(96, 165, 250, 0.4); border: 4px solid var(--accent-cyan);">
                <img src="data:image/png;base64,{{ qr_code }}" alt="QR Code" style="max-width: 200px; display: block;">
            </div>
            <div class="mono" style="margin-top: 1.5rem; font-size: 0.6rem; color: var(--accent-cyan); letter-spacing: 0.2em;">// OPTICAL_SCAN_ACTIVE</div>
        </div>

        <div style="margin-bottom: 2rem; padding: 1rem; background: rgba(0,0,0,0.4); border: 1px solid var(--border-machined); text-align: center;">
            <p class="mono" style="font-size: 0.6rem; color: var(--text-secondary); margin-bottom: 0.5rem;">MANUAL_SECRET_OVERRIDE:</p>
            <code class="mono" style="font-size: 1.1rem; letter-spacing: 4px; color: var(--accent-gold); font-weight: 700;">{{ secret }}</code>
        </div>
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="otp_code">SYCHRONIZATION_TOKEN</label>
                <input type="text" id="otp_code" name="otp_code" placeholder="[ 0 0 0 0 0 0 ]" maxlength="6" required style="text-align: center; font-size: 1.5rem; letter-spacing: 12px;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; height: 3.5rem;">Enable Secure Handshake</button>
        </form>

        <div class="auth-links mono" style="font-size: 0.7rem;">
            <a href="{{ url_for('dashboard') }}" style="color: var(--text-secondary);">ABORT_CONFIGURATION</a>
        </div>
    </div>
</div>
{% endblock %}
