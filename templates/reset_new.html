{% extends "base.html" %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div style="background: var(--kf-surface); padding: 3rem; border-radius: 1rem; border: 1px solid var(--kf-border); width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--kf-primary);">Set Enclave Key</h2>
        <p style="color: var(--kf-text-muted); font-size: 0.85rem; margin-bottom: 2rem;">Identity Verified. Generate a new Scrypt-hashed security key for your logistics node.</p>
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                <label style="color: var(--kf-text); display: block; margin-bottom: 0.5rem;">New Access Protocol (Password)</label>
                <div style="position: relative;">
                    <input type="password" id="npass" name="password" class="input-field" required minlength="4" style="width: 100%;">
                    <button type="button" onclick="togglePassword('npass')" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--kf-text-muted);">👁️</button>
                </div>
            </div>
            
            <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                <label style="color: var(--kf-text); display: block; margin-bottom: 0.5rem;">Verify Protocol</label>
                <div style="position: relative;">
                    <input type="password" id="cpass" name="confirm_password" class="input-field" required minlength="4" style="width: 100%;">
                    <button type="button" onclick="togglePassword('cpass')" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--kf-text-muted);">👁️</button>
                </div>
            </div>

            <script>
                function togglePassword(id) {
                    const input = document.getElementById(id);
                    input.type = input.type === 'password' ? 'text' : 'password';
                }
            </script>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Deploy New Key</button>
        </form>

    </div>
</div>
{% endblock %}
